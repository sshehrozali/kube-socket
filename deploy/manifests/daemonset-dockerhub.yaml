apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubetracer
  namespace: kube-system # Usually best for infra tools
  labels:
    app: kubetracer
spec:
  selector:
    matchLabels:
      app: kubetracer
  template:
    metadata:
      labels:
        app: kubetracer
    spec:
      # CRITICAL: This allows the pod to see the node's real network interfaces (eth0, etc.)
      hostNetwork: true
      
      # Optional: Only run on your "identity" nodes
      nodeSelector:
        kubernetes.io/arch: arm64
        domain: identity

      containers:
      - name: kubetracer
        image: shehrozdevhub/kubetracer:latest
        imagePullPolicy: Always
        
        # Performance/Stability settings
        env:
        - name: TRAFFIC_PORT
          value: "5000"
        - name: NODE_NETWORK_INTERFACE
          value: "any"

        # SECURITY: Sniffing requires raw socket access
        securityContext:
          capabilities:
            add:
              - NET_RAW
              - NET_ADMIN
          privileged: false # Keep it as secure as possible
        
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

      # Ensure it can run on master/control-plane nodes if needed
      tolerations:
      - operator: Exists
        effect: NoSchedule
